<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>登入 — vROps Alert Manager</title>
    <link rel="stylesheet" href="/static/css/style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" rel="stylesheet">
</head>
<body>
    <div class="login-container">
        <div class="login-box card glass-card">
            <h1><i class="fas fa-bell"></i> vROps Alert Manager</h1>
            <p>請輸入管理員帳號密碼</p>

            {% if error %}
            <div class="alert-error"><i class="fas fa-exclamation-triangle"></i> {{ error }}</div>
            {% endif %}

            <form method="POST" action="/login">
                <div class="form-group">
                    <label>帳號</label>
                    <input type="text" name="username" placeholder="admin" autofocus required>
                </div>
                <div class="form-group">
                    <label>密碼</label>
                    <input type="password" name="password" placeholder="••••••••" required>
                </div>
                <button type="submit" class="btn btn-primary" style="width:100%; justify-content:center; padding:12px;">
                    <i class="fas fa-sign-in-alt"></i> 登入
                </button>
            </form>
        </div>
    </div>
</body>
</html>
